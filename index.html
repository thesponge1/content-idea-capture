<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Capture">
<title>✦ Capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #F5EFE0;
    --golden: #C9A84C;
    --terracotta: #C1633A;
    --espresso: #2C1A0E;
    --espresso-mid: #4a2e1a;
    --muted: #9a8570;
    --white: #ffffff;
    --border: rgba(44,26,14,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--parchment);
    color: var(--espresso);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 1.1rem 1.5rem 0.9rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--parchment);
    z-index: 10;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-style: italic;
    font-weight: 300;
    color: var(--terracotta);
    letter-spacing: 0.02em;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.connected { background: #5a9e6f; }

  /* BODY */
  main {
    flex: 1;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }

  .field-label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  /* Inputs */
  .text-input {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--espresso);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .text-input:focus {
    border-color: var(--golden);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .text-input::placeholder { color: var(--muted); }

  /* Pillars */
  .pillar-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.55rem;
  }

  .pillar-btn {
    padding: 0.7rem 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.76rem;
    color: var(--espresso-mid);
    cursor: pointer;
    text-align: center;
    line-height: 1.35;
    transition: all 0.15s;
  }

  .pillar-btn:last-child:nth-child(odd) {
    grid-column: 1 / -1;
  }

  .pillar-btn .em {
    display: block;
    font-size: 1rem;
    margin-bottom: 0.2rem;
  }

  .pillar-btn.active {
    background: var(--espresso);
    border-color: var(--espresso);
    color: var(--parchment);
  }

  /* Textarea */
  .raw-wrap { position: relative; }

  textarea.text-input {
    resize: none;
    min-height: 150px;
    line-height: 1.65;
    padding-right: 3.2rem;
  }

  .mic-btn {
    position: absolute;
    bottom: 0.6rem;
    right: 0.6rem;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--parchment);
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .mic-btn.recording {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: white;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(193,99,58,0.35); }
    50% { box-shadow: 0 0 0 7px rgba(193,99,58,0); }
  }

  .mic-note {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.35rem;
    text-align: right;
    display: none;
  }

  /* Footer */
  footer {
    padding: 1rem 1.5rem 2rem;
    border-top: 1px solid var(--border);
  }

  .submit-btn {
    width: 100%;
    padding: 1rem;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, transform 0.1s;
  }

  .submit-btn:active { transform: scale(0.985); }
  .submit-btn:hover { background: #a84e28; }
  .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 1.75rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    padding: 0.65rem 1.3rem;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.ok { background: #2a5c3a; color: white; }
  #toast.err { background: #7a2020; color: white; }
  #toast.info { background: var(--espresso); color: var(--parchment); }
</style>
</head>
<body>

<header>
  <span class="logo">✦ capture</span>
  <div class="status-dot" id="status-dot" title="Checking connection..."></div>
</header>

<main>

  <div>
    <label class="field-label">Title / hook</label>
    <input type="text" class="text-input" id="title" placeholder="what's the one-liner?" autocomplete="off">
  </div>

  <div>
    <label class="field-label">Pillar</label>
    <div class="pillar-grid">
      <button class="pillar-btn" data-p="Self-trust & inner work" onclick="pickPillar(this)">
        <span class="em">🪞</span>Self-trust & inner work
      </button>
      <button class="pillar-btn" data-p="Leaving home & living boldly" onclick="pickPillar(this)">
        <span class="em">✈️</span>Leaving home & living boldly
      </button>
      <button class="pillar-btn" data-p="Connection & friendship" onclick="pickPillar(this)">
        <span class="em">🤝</span>Connection & friendship
      </button>
      <button class="pillar-btn" data-p="Spirituality & something bigger" onclick="pickPillar(this)">
        <span class="em">🌙</span>Spirituality & something bigger
      </button>
      <button class="pillar-btn" data-p="Day in my life" onclick="pickPillar(this)">
        <span class="em">☀️</span>Day in my life
      </button>
    </div>
  </div>

  <div>
    <label class="field-label">Raw capture — no editing, no judging</label>
    <div class="raw-wrap">
      <textarea class="text-input" id="raw" placeholder="word vomit your heart out..."></textarea>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Voice to text">🎙️</button>
    </div>
    <p class="mic-note" id="mic-note">voice input not supported on this browser</p>
  </div>

</main>

<footer>
  <button class="submit-btn" id="submit-btn" onclick="submitIdea()">Drop it in the bank →</button>
</footer>

<div id="toast"></div>

<script>
  let pillar = null;
  let isRecording = false;
  let recognition = null;

  // Check voice support
  window.addEventListener('DOMContentLoaded', () => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      document.getElementById('mic-btn').style.display = 'none';
      document.getElementById('mic-note').style.display = 'block';
    }
    // Ping health check
    fetch('/api/capture', { method: 'OPTIONS' })
      .then(() => document.getElementById('status-dot').classList.add('connected'))
      .catch(() => {});
  });

  function pickPillar(btn) {
    document.querySelectorAll('.pillar-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    pillar = btn.dataset.p;
  }

  function toggleMic() {
    if (isRecording) { recognition.stop(); return; }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    const ta = document.getElementById('raw');
    const btn = document.getElementById('mic-btn');
    let base = ta.value;
    if (base && !base.endsWith(' ')) base += ' ';

    recognition.onstart = () => {
      isRecording = true;
      btn.classList.add('recording');
      btn.textContent = '⏹️';
      showToast('Listening...', 'info');
    };

    recognition.onresult = e => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      if (final) base += final + ' ';
      ta.value = base + interim;
    };

    recognition.onerror = e => {
      if (e.error !== 'aborted') showToast('Mic error: ' + e.error, 'err');
      stopMic();
    };

    recognition.onend = stopMic;
    recognition.start();
  }

  function stopMic() {
    isRecording = false;
    const btn = document.getElementById('mic-btn');
    btn.classList.remove('recording');
    btn.textContent = '🎙️';
  }

  async function submitIdea() {
    const title = document.getElementById('title').value.trim();
    const raw = document.getElementById('raw').value.trim();

    if (!title) { showToast('Add a title first', 'err'); return; }
    if (!raw) { showToast('Capture something first', 'err'); return; }

    if (isRecording) recognition.stop();

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      const res = await fetch('/api/capture', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, pillar, raw })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');

      showToast('✓ In the bank', 'ok');
      reset();
    } catch (e) {
      showToast('Error: ' + e.message, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Drop it in the bank →';
    }
  }

  function reset() {
    document.getElementById('title').value = '';
    document.getElementById('raw').value = '';
    document.querySelectorAll('.pillar-btn').forEach(b => b.classList.remove('active'));
    pillar = null;
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(() => t.className = '', 3000);
  }
</script>
</body>
</html>
